version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm ci   # 🔥 MUST USE

  build:
    commands:
      - echo Building application...
      - npx tsc   # 🔥 ensure tsc works
      - npm run build

artifacts:
  files:
    - '**/*'
